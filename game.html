<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>アニマルつなぎ!</title>
<meta property="og:title" content="アニマルつなぎ!">
<meta property="og:description" content="かわいいどうぶつをつなげてポップ!">
<meta property="og:type" content="website">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;touch-action:none;-webkit-user-select:none;user-select:none;
  font-family:'Segoe UI','Hiragino Sans','Noto Sans JP',sans-serif;background:#0a0020;height:100dvh;width:100vw}
canvas{position:absolute;top:0;left:0;width:100%;height:100%}
#bottomBar{position:absolute;bottom:0;left:0;right:0;z-index:10;
  display:none;align-items:center;justify-content:space-between;
  padding:6px 10px;padding-bottom:max(6px,env(safe-area-inset-bottom));
  background:rgba(0,0,0,.55);backdrop-filter:blur(10px);border-top:1px solid rgba(255,255,255,.08)}
#bbSkill{display:flex;align-items:center;gap:8px;pointer-events:auto;cursor:pointer;
  -webkit-tap-highlight-color:transparent;border:none;background:none;padding:4px}
#bbSkill:active{transform:scale(.92)}
#bbSkillIcon{width:48px;height:48px;border-radius:50%;border:3px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.06);font-size:22px;display:flex;align-items:center;justify-content:center;
  position:relative;transition:border-color .3s,box-shadow .3s}
#bbSkillGauge{position:absolute;inset:-3px;border-radius:50%;pointer-events:none;opacity:.4}
#bbSkillIcon.ready{border-color:#ffd93d;box-shadow:0 0 16px rgba(255,217,61,.5);
  animation:skillP .8s ease-in-out infinite alternate}
@keyframes skillP{0%{transform:scale(1)}100%{transform:scale(1.08)}}
#bbSkillLabel{font-size:12px;font-weight:800;color:rgba(255,255,255,.4);max-width:72px;
  line-height:1.2;transition:color .3s}
#bbSkillLabel.ready{color:#ffd93d;animation:skillLabelBounce 1s ease-in-out infinite}
@keyframes skillLabelBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
#bbCenter{display:flex;align-items:center;gap:16px;flex:1;justify-content:center}
#bbScore{text-align:center}
#bbScore .v{font-size:30px;font-weight:900;color:#ffd93d;text-shadow:0 0 10px rgba(255,200,0,.3);line-height:1}
#bbScore .l{font-size:10px;color:rgba(255,255,255,.4);font-weight:700}
#bbTime{text-align:center}
#bbTime .v{font-size:26px;font-weight:800;color:#fff;line-height:1;transition:color .3s}
#bbTime .l{font-size:10px;color:rgba(255,255,255,.4);font-weight:700}
#bbCombo{font-size:14px;font-weight:800;color:#ffd93d;text-align:center;
  min-height:18px;opacity:0;transition:opacity .2s,font-size .15s;
  position:absolute;top:-22px;left:50%;transform:translateX(-50%);white-space:nowrap;
  text-shadow:0 0 8px rgba(255,200,0,.5);pointer-events:none}
#bbPause{pointer-events:auto;cursor:pointer;font-size:24px;-webkit-tap-highlight-color:transparent;
  width:48px;height:48px;border-radius:50%;border:2px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;
  transition:transform .12s;flex-shrink:0}
#bbPause:active{transform:scale(.9)}
#cbg{height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;
  position:absolute;bottom:0;left:0;right:0}
#cb{height:100%;width:0;border-radius:2px;background:linear-gradient(90deg,#6bcb77,#ffd93d)}
#ff{position:absolute;inset:0;z-index:5;pointer-events:none;
  box-shadow:inset 0 0 80px rgba(255,100,0,.5),inset 0 0 160px rgba(255,200,0,.2);opacity:0;transition:opacity .3s}
#ff.on{opacity:1;animation:fp .3s ease-in-out infinite alternate}
@keyframes fp{0%{opacity:.5;box-shadow:inset 0 0 60px rgba(255,100,0,.4),inset 0 0 120px rgba(255,200,0,.15)}
  100%{opacity:1;box-shadow:inset 0 0 100px rgba(255,100,0,.6),inset 0 0 200px rgba(255,200,0,.3)}}
#fl{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  font-size:52px;font-weight:900;color:#ffd93d;z-index:15;pointer-events:none;opacity:0;
  text-shadow:0 0 30px rgba(255,200,0,.8),0 0 60px rgba(255,100,0,.5);letter-spacing:3px}
.toast{position:absolute;left:50%;top:14%;transform:translateX(-50%) translateY(-20px);
  background:rgba(0,0,0,.7);backdrop-filter:blur(8px);color:#fff;padding:8px 22px;border-radius:50px;
  font-size:15px;font-weight:700;white-space:nowrap;pointer-events:none;z-index:30;opacity:0;
  border:1px solid rgba(255,255,255,.12);animation:ta 1.8s ease forwards}
@keyframes ta{0%{opacity:0;transform:translateX(-50%) translateY(-20px) scale(.85)}
  12%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}70%{opacity:1}
  100%{opacity:0;transform:translateX(-50%) translateY(25px) scale(.85)}}
.sp{position:absolute;pointer-events:none;z-index:20;font-weight:900;
  text-shadow:0 0 10px rgba(255,200,0,.7),0 2px 4px rgba(0,0,0,.5);animation:spp .9s cubic-bezier(.2,.8,.3,1) forwards}
@keyframes spp{0%{transform:translate(-50%,0) scale(.3);opacity:0}
  15%{transform:translate(-50%,5px) scale(1.5);opacity:1}
  30%{transform:translate(-50%,-20px) scale(1.1);opacity:1}
  70%{transform:translate(-50%,-70px) scale(1);opacity:1}
  100%{transform:translate(-50%,-110px) scale(.6);opacity:0}}
#vol{position:absolute;top:max(8px,env(safe-area-inset-top));right:8px;z-index:40;
  width:44px;height:44px;border-radius:50%;border:2px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.08);color:#fff;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.scr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:20px;z-index:50;transition:opacity .4s}
.scr.hide{display:none}
#ss{background:linear-gradient(180deg,#0a0020,#1a0533 30%,#2d1b69 65%,#4a2c8a)}
.emos{font-size:36px;margin-bottom:6px}
.emos span{display:inline-block;animation:bob 2s ease-in-out infinite;animation-delay:var(--d)}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.ttl{font-size:clamp(34px,10vw,58px);font-weight:900;text-align:center;line-height:1.1;
  background:linear-gradient(135deg,#ff7eb3,#ffe066,#7dd889,#5dd8cf,#b49cfc,#ff7eb3);
  background-size:400% 400%;-webkit-background-clip:text;background-clip:text;color:transparent;
  animation:gs 6s ease infinite;margin-bottom:4px}
@keyframes gs{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.sub{font-size:14px;color:rgba(255,255,255,.55);margin-bottom:12px;text-align:center}
.dr{display:flex;gap:8px;margin-bottom:16px}
.db{padding:13px 22px;font-size:14px;font-weight:700;border:2px solid rgba(255,255,255,.2);
  border-radius:25px;color:rgba(255,255,255,.6);background:rgba(255,255,255,.05);
  cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;min-height:48px;
  display:flex;align-items:center;justify-content:center}
.db.on{color:#fff;border-color:#ffd93d;background:rgba(255,221,87,.15);box-shadow:0 0 16px rgba(255,221,87,.2)}
.ab{font-size:24px!important;padding:8px 12px!important;min-height:48px}
.btn{padding:18px 56px;font-size:22px;font-weight:800;border:none;border-radius:50px;
  color:#fff;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.3);-webkit-tap-highlight-color:transparent;
  transition:transform .12s;position:relative;overflow:hidden;min-height:56px}
.btn:active{transform:scale(.94)}
.bg{background:linear-gradient(135deg,#7dd889,#2ecc71)}
.br{background:linear-gradient(135deg,#b49cfc,#6366f1);margin-top:8px}
.bsm{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);margin-top:6px;padding:12px 36px;font-size:16px}
#es{background:rgba(5,0,20,.92);backdrop-filter:blur(10px)}
.ee{font-size:64px;margin-bottom:8px;animation:bob 2s ease-in-out infinite}
.stars{font-size:42px;margin-bottom:4px;min-height:50px}
.stars span{display:inline-block;opacity:0;transform:scale(0) rotate(-30deg);
  transition:all .4s cubic-bezier(.34,1.56,.64,1)}
.stars span.on{opacity:1;transform:scale(1) rotate(0deg)}
.stars span.off{opacity:.3;transform:scale(.8) rotate(0deg)}
.er{font-size:20px;font-weight:700;margin-bottom:2px;letter-spacing:1px;color:rgba(255,255,255,.7)}
.esc{font-size:52px;font-weight:900;color:#ffd93d;text-shadow:0 0 20px rgba(255,200,0,.3)}
.el{font-size:13px;color:rgba(255,255,255,.45);margin-bottom:14px}
.eg{display:grid;grid-template-columns:1fr 1fr;gap:8px 24px;margin-bottom:18px;text-align:center}
.ev{font-size:22px;font-weight:800;color:#fff}
.esl{font-size:12px;color:rgba(255,255,255,.45)}
.en{color:#7dd889;font-size:15px;font-weight:700;margin-bottom:12px;animation:bob 1.5s ease-in-out infinite}
#cd{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:110px;font-weight:900;color:#fff;z-index:45;pointer-events:none;
  text-shadow:0 0 40px rgba(255,255,255,.4);opacity:0}
@keyframes cdp{0%{transform:translate(-50%,-50%) scale(0);opacity:0}
  25%{transform:translate(-50%,-50%) scale(1.15);opacity:1}
  65%{transform:translate(-50%,-50%) scale(1);opacity:1}
  100%{transform:translate(-50%,-50%) scale(.4);opacity:0}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
#ps{background:rgba(5,0,20,.95);backdrop-filter:blur(16px)}
@media(prefers-reduced-motion:reduce){.ttl,.emos span,.ee,.en{animation:none}}
.mode-sel{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;justify-content:center}
.mode-btn{padding:10px 16px;font-size:13px;font-weight:700;border:2px solid rgba(255,255,255,.15);
  border-radius:20px;color:rgba(255,255,255,.5);background:rgba(255,255,255,.04);
  cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;min-height:44px}
.mode-btn.on{color:#fff;border-color:#ffd93d;background:rgba(255,221,87,.12);box-shadow:0 0 12px rgba(255,221,87,.15)}
.daily-info{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:8px;min-height:18px;text-align:center}
.daily-info b{color:#ffd93d}
.bottom-btns{display:flex;gap:8px;margin-top:8px}
.bottom-btns .btn{padding:10px 20px;font-size:14px;min-height:42px}
.hs-wrap{width:100%;max-width:300px;margin-bottom:12px}
.hs-title{font-size:14px;font-weight:800;color:rgba(255,255,255,.7);text-align:center;margin-bottom:6px}
.hs-row{display:flex;align-items:center;gap:8px;padding:4px 10px;border-radius:8px;font-size:13px;color:rgba(255,255,255,.7)}
.hs-row:nth-child(2){background:rgba(255,217,61,.12);color:#ffd93d;font-weight:800}
.hs-row:nth-child(3){background:rgba(255,255,255,.05)}
.hs-rank{min-width:22px;font-weight:800;text-align:center}
.hs-animal{min-width:20px;text-align:center}
.hs-score{flex:1;text-align:right;font-weight:700;font-size:14px}
.hs-date{font-size:10px;color:rgba(255,255,255,.35);min-width:42px;text-align:right}
.hs-new{color:#ffd93d;font-size:11px;font-weight:800;animation:pulse .8s ease-in-out infinite}
.modal-scr{position:absolute;inset:0;z-index:55;background:rgba(5,0,20,.95);backdrop-filter:blur(16px);
  display:flex;flex-direction:column;align-items:center;padding:20px;padding-top:max(20px,env(safe-area-inset-top));overflow-y:auto}
.modal-scr.hide{display:none}
.ach-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;max-width:360px;width:100%;margin-bottom:16px}
.ach-item{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:8px 4px;text-align:center}
.ach-item.locked{opacity:.35;filter:grayscale(.7)}
.ach-emoji{font-size:26px}
.ach-name{font-size:11px;color:rgba(255,255,255,.8);font-weight:700;margin-top:2px}
.ach-desc{font-size:9px;color:rgba(255,255,255,.4)}
.ach-toast{position:absolute;left:50%;top:12%;transform:translateX(-50%) translateY(20px);
  background:linear-gradient(135deg,rgba(255,217,61,.9),rgba(255,160,50,.9));backdrop-filter:blur(8px);
  color:#fff;padding:10px 22px;border-radius:16px;font-size:15px;font-weight:800;white-space:nowrap;
  pointer-events:none;z-index:35;opacity:0;border:2px solid rgba(255,255,255,.3);
  box-shadow:0 4px 20px rgba(255,200,0,.4);animation:acht 2.5s ease forwards}
@keyframes acht{0%{opacity:0;transform:translateX(-50%) translateY(20px) scale(.8)}
  10%{opacity:1;transform:translateX(-50%) translateY(0) scale(1.1)}
  20%{transform:translateX(-50%) translateY(0) scale(1)}75%{opacity:1}
  100%{opacity:0;transform:translateX(-50%) translateY(-30px) scale(.8)}}
#urgency{position:absolute;inset:0;z-index:4;pointer-events:none;opacity:0;transition:opacity .3s;
  box-shadow:inset 0 0 100px rgba(255,50,50,.4),inset 0 0 200px rgba(255,0,0,.15)}
@keyframes urgPulse{0%,100%{opacity:.6}50%{opacity:1}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ff"></div><div id="fl">FEVER!</div><div id="cd"></div>
<div id="bottomBar">
  <button id="bbSkill"><div id="bbSkillIcon"><div id="bbSkillGauge"></div>🐱</div>
    <div id="bbSkillLabel">0%</div></button>
  <div id="bbCenter" style="position:relative">
    <div id="bbCombo"></div>
    <div style="display:flex;align-items:center;gap:14px;justify-content:center">
      <div id="bbScore"><div class="v" id="sv">0</div><div class="l">SCORE</div></div>
      <div id="bbTime"><div class="v" id="tv">70</div><div class="l" id="tl">TIME</div></div>
    </div>
    <div id="cbg"><div id="cb"></div></div>
  </div>
  <button id="bbPause">⏸</button>
</div>
<button id="vol">🔊</button>
<div class="scr" id="ss">
  <div class="emos"><span style="--d:0s">🐱</span><span style="--d:.12s">🐶</span><span style="--d:.24s">🐰</span><span style="--d:.36s">🦊</span><span style="--d:.48s">🐼</span><span style="--d:.6s">🐸</span></div>
  <div class="ttl">アニマル<br>つなぎ!</div>
  <div class="sub">おなじどうぶつをなぞってつなげよう!</div>
  <div class="sub" style="margin-bottom:6px">マイアニマル</div>
  <div class="dr" id="animalSel" style="flex-wrap:wrap;justify-content:center;gap:6px">
    <button class="db ab on" data-a="0">🐱</button>
    <button class="db ab" data-a="1">🐶</button>
    <button class="db ab" data-a="2">🐰</button>
    <button class="db ab" data-a="3">🦊</button>
    <button class="db ab" data-a="4">🐼</button>
    <button class="db ab" data-a="5">🐸</button>
  </div>
  <div class="sub" style="margin-bottom:4px">モード</div>
  <div class="mode-sel" id="modeSel">
    <button class="mode-btn on" data-m="timeattack">⏱ タイムアタック</button>
    <button class="mode-btn" data-m="daily">📅 デイリー</button>
  </div>
  <div class="daily-info" id="dailyInfo" style="display:none"></div>
  <div class="hs-wrap" id="hsWrap"></div>
  <button class="btn bg" id="bgo">あそぶ!</button>
  <div class="bottom-btns">
    <button class="btn bsm" id="achBtn">🏅 じっせき</button>
  </div>
</div>
<div class="scr hide" id="es">
  <div class="ee" id="eE">🏆</div>
  <div class="stars" id="eSt"><span>⭐</span><span>⭐</span><span>⭐</span></div>
  <div class="esc" id="eS">0</div><div class="el">てん</div>
  <div class="er" id="eR"></div>
  <div class="eg">
    <div><div class="ev" id="eP">0</div><div class="esl" id="ePL">ポップ</div></div>
    <div><div class="ev" id="eC">0</div><div class="esl" id="eCL">さいこうコンボ</div></div>
    <div><div class="ev" id="eL">0</div><div class="esl" id="eLL">ながさMAX</div></div>
    <div><div class="ev" id="eB">0</div><div class="esl" id="eBL">ベスト</div></div>
  </div>
  <div id="eNext" style="font-size:13px;color:rgba(255,255,255,.45);margin-bottom:4px;min-height:18px"></div>
  <div class="en" id="eN" style="display:none">⭐ ベストスコア こうしん! ⭐</div>
  <div id="eHsRank" style="font-size:14px;font-weight:800;color:#ffd93d;margin-bottom:4px;display:none"></div>
  <div id="ePC" style="font-size:12px;color:rgba(255,255,255,.4);margin-bottom:8px"></div>
  <button class="btn br" id="bre">もういっかい!</button>
  <button class="btn bsm" id="shareBtn">📤 シェア</button>
  <button class="btn bsm" id="bback">タイトルにもどる</button>
</div>
<div class="scr hide" id="ps">
  <div style="font-size:64px;margin-bottom:12px">⏸</div>
  <div style="font-size:clamp(28px,8vw,44px);font-weight:900;color:#fff;margin-bottom:6px">ポーズ</div>
  <div style="font-size:14px;color:rgba(255,255,255,.5);margin-bottom:24px">ゲームはいちじていしちゅう</div>
  <button class="btn bg" id="resumeBtn">つづける</button>
  <button class="btn br" id="quitBtn">やめる</button>
</div>
<div class="modal-scr hide" id="achScr">
  <div style="font-size:36px;margin-bottom:4px">🏅</div>
  <div style="font-size:clamp(22px,6vw,32px);font-weight:900;color:#ffd93d;margin-bottom:4px">じっせき</div>
  <div style="font-size:12px;color:rgba(255,255,255,.4);margin-bottom:12px" id="achCount">0/6</div>
  <div class="ach-grid" id="achGrid"></div>
  <button class="btn bsm" id="achClose">とじる</button>
</div>
<div id="urgency"></div>
<script>
// ======== CONSTANTS ========
const TYPES=[
  {emoji:'🐱',color:'#ff7eb3',light:'#ffd0e3',name:'ネコ'},
  {emoji:'🐶',color:'#ffb756',light:'#ffe2b8',name:'イヌ'},
  {emoji:'🐰',color:'#5dd8cf',light:'#b5f2ed',name:'ウサギ'},
  {emoji:'🦊',color:'#ffe066',light:'#fff3bf',name:'キツネ'},
  {emoji:'🐼',color:'#7dd889',light:'#c8f0cd',name:'パンダ'},
  {emoji:'🐸',color:'#b49cfc',light:'#ddd2ff',name:'カエル'},
];
const SKILLS=[
  {name:'ネコラッシュ',desc:'30こ へんしん!',charge:22,fn:()=>skillMegaTransform(30)},
  {name:'イヌハウル',desc:'1しゅるい ぜんぶへんしん!',charge:20,fn:()=>skillTypeConvert(1)},
  {name:'ムーンタイム',desc:'スロー+15こへんしん!',charge:20,fn:()=>skillSlowMo(6000)},
  {name:'キツネマジック',desc:'2しゅるい ぜんぶへんしん!',charge:22,fn:()=>skillTypeConvert(2)},
  {name:'パンダウェーブ',desc:'ちかくの25こ へんしん!',charge:22,fn:()=>skillAreaTransform()},
  {name:'レインボータイム',desc:'8びょう なんでもつながる!',charge:22,fn:()=>skillRainbowTime(8000)},
];
const CFG={time:70,types:5,balls:115,hint:3000,comboWin:3000,feverDur:9000};
const PENTA=[262,294,330,392,440,523,587,660,784,880,1047,1175];
const MISSIONS=[
  {s:100,m:'🎯 100てん とっぱ!'},{s:300,m:'🎯 300てん すごい!'},{s:600,m:'🎯 600てん いいかんじ!'},
  {s:1000,m:'🎯 1000てん やったね!'},{s:1800,m:'🏆 1800てん! チャンピオン!'},{s:3000,m:'👑 3000てん!'}];
const SPECIALS=[
  {type:'gold',rate:.025,emoji:'✨'},
  {type:'rainbow',rate:.012,emoji:'🌈'}];
const ANIMAL_POP_FX=[
  {emoji:'🐾',cs:['#ff7eb3','#ffd0e3']},
  {emoji:'🦴',cs:['#ffb756','#ffe2b8']},
  {emoji:'🥕',cs:['#5dd8cf','#b5f2ed']},
  {emoji:'🔥',cs:['#ffe066','#fff3bf']},
  {emoji:'🎋',cs:['#7dd889','#c8f0cd']},
  {emoji:'💧',cs:['#b49cfc','#ddd2ff']}];
const ACHIEVEMENTS=[
  {id:'firstPop',emoji:'🎈',name:'はじめてのポップ',desc:'はじめてポップした'},
  {id:'chain8',emoji:'⛓',name:'8つなぎ',desc:'8チェインした'},
  {id:'score1k',emoji:'🎯',name:'1000てん',desc:'1000てんとった'},
  {id:'firstFever',emoji:'🔥',name:'はじめてのフィーバー',desc:'はじめてフィーバーした'},

function emit(x,y,n,opts={}){
  const{speed:sp=5,size:sz=5,colors:cs=['#fff','#ffd93d'],gravity:gr=.12,decay:dc=.025,
    shapes:sh=['circle']}=opts;
  for(let i=0;i<n&&particles.length<500;i++){const a=Math.random()*Math.PI*2,v=sp*(.4+Math.random()*.8);
    particles.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-1,sz:sz*(.4+Math.random()*.8),
      c:cs[~~(Math.random()*cs.length)],life:1,dc:dc+Math.random()*.015,gr,
      shape:sh[~~(Math.random()*sh.length)],rot:Math.random()*Math.PI*2,rotV:(Math.random()-.5)*.2})}}
function tickP(){
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=p.gr;p.vx*=.97;
    p.life-=p.dc;p.rot+=p.rotV;if(p.life<=0){particles[i]=particles[particles.length-1];particles.pop()}}
  for(let i=trails.length-1;i>=0;i--){trails[i].life-=.05;
    if(trails[i].life<=0){trails[i]=trails[trails.length-1];trails.pop()}}}
function drawStarShape(c,x,y,r){c.beginPath();for(let i=0;i<10;i++){
    const a=i*Math.PI/5-Math.PI/2,rd=i%2===0?r:r*.4;c.lineTo(x+Math.cos(a)*rd,y+Math.sin(a)*rd)}c.closePath();c.fill()}
function drawHeartShape(c,x,y,s){c.beginPath();c.moveTo(x,y+s*.3);
  c.bezierCurveTo(x+s*.5,y-s*.3,x+s,y+s*.1,x,y+s);
  c.bezierCurveTo(x-s,y+s*.1,x-s*.5,y-s*.3,x,y+s*.3);c.fill()}

  trails.forEach(t=>{cx.globalAlpha=t.life*.5;cx.fillStyle=t.c;cx.beginPath();cx.arc(t.x,t.y,t.sz*t.life,0,Math.PI*2);cx.fill()});
  particles.forEach(p=>{cx.globalAlpha=p.life;cx.fillStyle=p.c;const sz=p.sz*p.life;
    if(!p.shape||p.shape==='circle'){cx.beginPath();cx.arc(p.x,p.y,sz,0,Math.PI*2);cx.fill()}
    else{cx.save();cx.translate(p.x,p.y);cx.rotate(p.rot);
      if(p.shape==='star')drawStarShape(cx,0,0,sz);
      else if(p.shape==='heart')drawHeartShape(cx,0,-sz*.3,sz*.6);
      else if(p.shape==='diamond'){cx.beginPath();cx.moveTo(0,-sz);cx.lineTo(sz*.6,0);cx.lineTo(0,sz);cx.lineTo(-sz*.6,0);cx.closePath();cx.fill()}
      cx.restore()}});cx.globalAlpha=1}

function emitSpeedLines(n,intensity){

    if(side===0){x=Math.random()*W;y=-10;vx=(Math.random()-.5)*2;vy=spd}

function drawBG(now){
  bgT+=.004;let h=235+Math.sin(bgT*.3)*12,sat=45,lit=8;

// ======== SPATIAL HASH GRID ========
let shGrid={};const SH_SIZE=50;
function shBuild(list){shGrid={};for(const b of list){
  const k=(Math.floor(b.x/SH_SIZE))+','+(Math.floor(b.y/SH_SIZE));
  if(!shGrid[k])shGrid[k]=[];shGrid[k].push(b)}}
function shNear(b){const gx=Math.floor(b.x/SH_SIZE),gy=Math.floor(b.y/SH_SIZE),r=[];
  for(let dx=-1;dx<=1;dx++)for(let dy=-1;dy<=1;dy++){
    const c=shGrid[(gx+dx)+','+(gy+dy)];if(c)for(const o of c)if(o!==b)r.push(o)}return r}

// ======== PHYSICS ENGINE ========
function makeBall(x,y,type,special){
  return{id:nextId++,x,y,vx:0,vy:0,r:ballR,type,phase:Math.random()*Math.PI*2,
    scale:1,alpha:1,selected:false,popping:false,popT:0,sleep:0,px:x,py:y,
    special:special||null}}
function rollSpecial(){
  if(gm.score<80)return null;
  const r=Math.random();let a=0;
  for(const s of SPECIALS){a+=s.rate;if(r<a)return s.type}return null}
function wakeBall(b){b.sleep=0;b.px=b.x;b.py=b.y}
function wakeNear(b){const near=shNear(b);for(const o of near){if(o.sleep>30){o.sleep=0;o.px=o.x;o.py=o.y}}}
function physicsTick(){
  const G=0.45,DAMP=0.9,ITER=8,SLP=20;
  const alive=balls.filter(b=>!b.popping);
  // Phase 1: Integrate awake balls only
  for(const b of alive){
    if(b.sleep>SLP)continue;
    b.px=b.x;b.py=b.y;
    b.vy+=G;b.vx*=DAMP;b.vy*=DAMP;
    b.x+=b.vx;b.y+=b.vy}
  // Phase 2: Position-only constraints
  shBuild(alive);
  for(let it=0;it<ITER;it++){
    if(it===4)shBuild(alive);
    for(let i=0;i<alive.length;i++){const a=alive[i];
      const aS=a.sleep>SLP;
      const near=shNear(a);
      for(const b of near){
        if(b.id<=a.id)continue;
        const bS=b.sleep>SLP;
        if(aS&&bS)continue; // Both sleeping: skip entirely
        const dx=b.x-a.x,dy=b.y-a.y,dSq=dx*dx+dy*dy,minD=a.r+b.r;
        if(dSq<minD*minD&&dSq>.001){
          const d=Math.sqrt(dSq),ov=minD-d,nx=dx/d,ny=dy/d;
          // Sleeping balls are near-immovable
          const wA=aS?.02:1,wB=bS?.02:1,t=wA+wB;
          a.x-=nx*ov*(wB/t);a.y-=ny*ov*(wB/t);
          b.x+=nx*ov*(wA/t);b.y+=ny*ov*(wA/t);
          // Wake sleeping ball only on big overlap
          if(ov>1.5){if(aS){a.sleep=0;a.px=a.x;a.py=a.y}
                     if(bS){b.sleep=0;b.px=b.x;b.py=b.y}}}}}}
  // Wall constraints: apply to ALL balls after collision resolution
  for(const a of alive){
    if(a.x-a.r<areaL){a.x=areaL+a.r;if(a.sleep<=SLP)a.vx=0}
    if(a.x+a.r>areaR){a.x=areaR-a.r;if(a.sleep<=SLP)a.vx=0}
    if(a.y+a.r>areaB){a.y=areaB-a.r;if(a.sleep<=SLP)a.vy=0}
    if(a.y-a.r<areaT-ballR*6){a.y=areaT-ballR*6+a.r;if(a.sleep<=SLP)a.vy=0}}
  // Phase 3: Derive velocity from position change (PBD)
  for(const b of alive){
    if(b.sleep>SLP)continue;
    b.vx=(b.x-b.px)*.8;b.vy=(b.y-b.py)*.8}
  // Phase 4: Sleep detection by actual movement
  for(const b of alive){
    if(b.sleep>SLP)continue;
    const moved=Math.abs(b.x-b.px)+Math.abs(b.y-b.py);
    if(moved<.1){b.vx=0;b.vy=0;b.sleep++;
      if(b.sleep>=SLP){b.px=b.x;b.py=b.y}}
    else b.sleep=0}
  settled=alive.every(b=>b.sleep>SLP)}

// ======== BALL MANAGEMENT ========
function initBalls(){
  balls=[];nextId=0;
  const rng=gm.mode==='daily'?dailyRng:Math.random;
  const tc=CFG.types;
  const count=CFG.balls;
  for(let i=0;i<count;i++){
    const x=areaL+ballR+rng()*(areaR-areaL-ballR*2);
    const y=areaT-ballR*(2+rng()*14);
    const b=makeBall(x,y,~~(rng()*tc));
    b.vy=3+rng()*4;b.vx=(rng()-.5)*2;
    balls.push(b)}}
function checkSpawn(){
  const target=CFG.balls;
  const alive=balls.filter(b=>!b.popping);
  const needed=target-alive.length-spawnQueue;
  if(needed>0){spawnQueue+=needed;
    for(const b of alive){b.sleep=0;b.px=b.x;b.py=b.y}}}
function tickSpawn(){
  if(spawnQueue<=0)return;
  const perFrame=Math.min(spawnQueue,4);
  const tc=CFG.types;
  for(let s=0;s<perFrame;s++){
    const x=areaL+ballR+Math.random()*(areaR-areaL-ballR*2);
    const sp=rollSpecial();
    const b=makeBall(x,areaT-ballR*(2+Math.random()*4),~~(Math.random()*tc),sp);
    b.vy=3+Math.random()*4;b.vx=(Math.random()-.5)*2;
    balls.push(b);spawnQueue--}
  if(spawnQueue<=0)spawnT=0}
function findGroups(){
  const alive=balls.filter(b=>!b.popping);shBuild(alive);
  const vis=new Set(),groups=[];
  for(const b of alive){if(vis.has(b.id))continue;
    const grp=[],q=[b];vis.add(b.id);
    while(q.length>0){const c=q.shift();grp.push(c);
      const near=shNear(c);
      for(const o of near){if(!vis.has(o.id)&&!o.popping&&o.type===c.type&&
        Math.hypot(o.x-c.x,o.y-c.y)<ballR*ADJ_F){vis.add(o.id);q.push(o)}}}
    if(grp.length>=3)groups.push(grp)}
  return groups}
function hasValid(){return findGroups().length>0}
function ensureValid(){
  let att=0;
  while(!hasValid()&&att<15){const tc=CFG.types;
    const alive=balls.filter(b=>!b.popping);shBuild(alive);
    // Smart shuffle: make nearby balls the same type
    for(let i=0;i<3;i++){const b=alive[~~(Math.random()*alive.length)];
      const near=shNear(b).filter(o=>!o.popping);
      if(near.length>=2){const tp=~~(Math.random()*tc);
        b.type=tp;near[0].type=tp;near[1].type=tp;break}}
    att++}
  if(att>0&&gm.running)toast('🔄 シャッフル!')}
function findHint(){const groups=findGroups();if(!groups.length)return null;
  return groups.reduce((a,b)=>b.length>a.length?b:a,groups[0])}

// ======== CHAIN ========
function startChain(ball){
  if(popAnim||!gm.running||gm.paused)return;
  chain=[ball];ball.selected=true;
  chainType=ball.special==='rainbow'?-1:ball.type;
  dragging=true;sfxConn(1);haptic(10);hintT=0;hintGroup=null}
function tryConnect(px,py){
  if(!dragging||!chain.length)return;
  if(chain.length>=2){const prev=chain[chain.length-2],last=chain[chain.length-1];
    const dPrev=Math.hypot(px-prev.x,py-prev.y),dLast=Math.hypot(px-last.x,py-last.y);
    if(dPrev<ballR*1.5&&dPrev<dLast){chain.pop().selected=false;sfxConn(chain.length);return}}
  const touchR=ballR*TOUCH_F,last=chain[chain.length-1];
  let best=null,bestD=Infinity;
  for(const b of balls){
    if(b.selected||b.popping)continue;
    const typeOk=gm._rainbowTime||b.special==='rainbow'||last.special==='rainbow'||chainType===-1||b.type===chainType;
    if(!typeOk)continue;
    const dt=Math.hypot(px-b.x,py-b.y);
    if(dt>touchR)continue;
    if(Math.hypot(last.x-b.x,last.y-b.y)>=ballR*ADJ_F*(gm._reachMul||1))continue;
    if(dt<bestD){best=b;bestD=dt}}
  if(best){const b=best;
    b.selected=true;
    if(chainType===-1&&b.special!=='rainbow')chainType=b.type;
    const boost=Math.min(chain.length*.06,.5);b.scale=1.4+boost;
    chain.push(b);sfxConn(chain.length);haptic(10+chain.length*5);
    if(chain.length>=3)triggerShake(chain.length*1.5);
    if(chain.length>=4)flashAlpha=Math.min(flashAlpha+.04+chain.length*.01,.3);
    if(chain.length===3){sfxValid();haptic(25)}
    if(chain.length>=2){const prev=chain[chain.length-2];
      for(let i=0;i<5;i++){const t=i/5;
        trails.push({x:prev.x+(b.x-prev.x)*t+(Math.random()-.5)*10,
          y:prev.y+(b.y-prev.y)*t+(Math.random()-.5)*10,
          sz:3+Math.random()*3,c:TYPES[b.type]?TYPES[b.type].light:'#fff',life:1})}}}}
function endChain(){
  if(!dragging)return;dragging=false;touchPos=null;
  if(chain.length>=3)beginPop();
  else{chain.forEach(b=>{b.selected=false;b.scale=1});chain=[]}}

// ======== POP ANIMATION ========
function beginPop(){
  popAnim={balls:[...chain],type:chainType,len:chain.length,time:0,phase:'charge'};
  chain.forEach(b=>{b.selected=false;b.popping=true;b.vx=0;b.vy=0});chain=[]}
function tickPop(dt){
  if(!popAnim)return;popAnim.time+=dt;const pa=popAnim,len=pa.len;
  if(pa.phase==='charge'){
    const dur=Math.max(100,180-len*4);
    const prog=Math.min(pa.time/dur,1);
    pa.balls.forEach(b=>{
      b.scale=1+prog*.5+prog*prog*.3;
      const shake=prog*prog*(2+len*.3);
      b._shakeX=(Math.random()-.5)*shake;b._shakeY=(Math.random()-.5)*shake});
    if(pa.time>=dur){pa.phase='hitstop';pa.time=0}}
  else if(pa.phase==='hitstop'){
    // Freeze frame: longer for bigger chains = more satisfying
    const hsDur=len>=10?120:len>=7?80:len>=5?50:20;
    pa.balls.forEach(b=>{b.scale=1.8;b._shakeX=(Math.random()-.5)*1.5;b._shakeY=(Math.random()-.5)*1.5});
    if(pa.time>=hsDur){pa.phase='explode';pa.time=0;
      // Visual merikari: scale effects by chain length
      if(len>=5)triggerShake(6+len*3);
      if(len>=5)triggerFlash(.08+len*.03);
      if(len>=8){addRipple(W/2,H/2,'#ffd93d',W*.4);
        [0,.03,.06,.09].forEach((d,i)=>nt(200+i*100,'triangle',.08,.1,d))}
      if(len>=10){triggerShake(30+len*2);triggerFlash(.6);
        [[0,0],[W,0],[0,H],[W,H],[W/2,0],[W/2,H]].forEach(([x,y])=>emit(x,y,20,{speed:12,size:7,
          colors:['#ff7eb3','#ffe066','#7dd889','#5dd8cf','#b49cfc','#ffd93d'],gravity:.04,shapes:['star','heart','diamond']}))}
      pa.balls.forEach((b,i)=>{b.popping=true;b.popT=0;b._shakeX=0;b._shakeY=0;sfxPop(i,len);
        const fx=ANIMAL_POP_FX[b.type]||ANIMAL_POP_FX[0];
        const emitCount=len<5?8:20+len*2;
        emit(b.x,b.y,emitCount,{speed:6+len*.7,size:6+len*.4,
          colors:[TYPES[b.type]?TYPES[b.type].color:fx.cs[0],fx.cs[1],'#fff','#ffd93d'],
          gravity:.07,shapes:['circle','circle','star','diamond','heart']});
        addRipple(b.x,b.y,TYPES[b.type]?TYPES[b.type].color:'#fff',60+len*8)});
      if(len>=5){const mid=pa.balls[~~(len/2)];addRipple(mid.x,mid.y,'#fff',W*.4+len*10)}
      if(len>=8)emitSpeedLines(len*2,len*.15);
      else if(len>=5)emitSpeedLines(len,len*.1)}}
  else if(pa.phase==='explode'){
    pa.balls.forEach(b=>{b.popT+=dt;const prog=Math.min(b.popT/140,1);
      b.scale=1.6*(1-prog*prog);b.alpha=1-prog});
    if(pa.time>=120)pa.phase='done'}
  if(pa.phase==='done'){
    // Handle special balls - Gold gives +100 bonus AND explodes nearby
    let extraPopped=0,goldBonus=0,goldUsed=false;
    for(const b of pa.balls){
      if(b.special==='gold'){goldUsed=true;goldBonus+=100;
        sfxBomb();triggerShake(20);triggerFlash(.4);addRipple(b.x,b.y,'#ffd93d',W*.5);
        const nearby=balls.filter(o=>!o.popping&&!pa.balls.includes(o)&&Math.hypot(o.x-b.x,o.y-b.y)<ballR*3.5);
        for(const o of nearby){o.popping=true;o.popT=0;extraPopped++;
          emit(o.x,o.y,10,{speed:5,size:4,colors:['#ffd93d','#ffe066','#fff'],gravity:.08})}}
      const idx=balls.indexOf(b);if(idx>=0){balls[idx]=balls[balls.length-1];balls.pop()}}
    // Remove extra gold explosion victims
    if(extraPopped>0)setTimeout(()=>{balls=balls.filter(b=>!b.popping);checkSpawn()},150);
    if(goldBonus>0){gm.score+=goldBonus;document.getElementById('sv').textContent=gm.score;
      const mid=pa.balls[~~(len/2)];if(mid)scorePop(mid.x,mid.y-30,'✨+'+goldBonus,'#ffd93d',28)}
    gm.popped+=extraPopped;
    creditScore(pa);checkSpawn();
    if(goldUsed)saveStats();
    setTimeout(()=>{if(gm.running&&!gm.paused)ensureValid()},600);
    popAnim=null}}

// ======== SCORE / COMBO ========
function creditScore(pa){
  const len=pa.len,now=performance.now();
  const base=len*20,chainBonus=len>=4?Math.floor(Math.pow(len-3,2.0)*18):0;
  const win=CFG.comboWin;
  if(now-gm.lastClear<win)gm.combo++;else gm.combo=1;
  gm.lastClear=now;if(gm.combo>gm.maxCombo)gm.maxCombo=gm.combo;
  const cMul=1+Math.min(gm.combo-1,9)*.3,fMul=gm.fever?2:1;
  const earned=~~((base+chainBonus)*cMul*fMul);
  gm.score+=earned;gm.popped+=len;if(len>gm.maxChain)gm.maxChain=len;

function drawChainLine(now){
  if(chain.length===0)return;
  const tp=chainType>=0?TYPES[chainType]:{color:'#ffd93d',light:'#fff3bf'},pts=[];
  chain.forEach(b=>{const idle=Math.sin(now*.004+b.phase)*1.2;pts.push({x:b.x,y:b.y+idle})});
  if(dragging&&touchPos)pts.push({x:touchPos.x,y:touchPos.y});
  if(pts.length<2&&!dragging)return;
  const intensity=Math.min(chain.length/10,1);
  cx.save();cx.lineCap='round';cx.lineJoin='round';
  // Glow
  const useRainbow=chain.length>=8;
  if(useRainbow){const rg=cx.createLinearGradient(pts[0].x,pts[0].y,pts[pts.length-1].x,pts[pts.length-1].y);
    rg.addColorStop(0,'#ff7eb3');rg.addColorStop(.17,'#ffb756');rg.addColorStop(.33,'#ffe066');
    rg.addColorStop(.5,'#7dd889');rg.addColorStop(.67,'#5dd8cf');rg.addColorStop(.83,'#b49cfc');rg.addColorStop(1,'#ff7eb3');
    cx.strokeStyle=rg}else cx.strokeStyle=tp.color;
  cx.lineWidth=22+intensity*20;cx.globalAlpha=.12+intensity*.12;
  cx.shadowBlur=30+intensity*30;cx.shadowColor=tp.color;
  cx.beginPath();pts.forEach((p,i)=>i===0?cx.moveTo(p.x,p.y):cx.lineTo(p.x,p.y));cx.stroke();
  // Dashes
  cx.shadowBlur=0;cx.lineWidth=8+intensity*6;cx.globalAlpha=.5;cx.strokeStyle=tp.light;
  cx.setLineDash([14,10]);cx.lineDashOffset=-now*(.06+intensity*.08);
  cx.beginPath();pts.forEach((p,i)=>i===0?cx.moveTo(p.x,p.y):cx.lineTo(p.x,p.y));cx.stroke();
  cx.setLineDash([]);
  // Core
  const pulse=1+Math.sin(now*(.008+intensity*.012))*.15;
  cx.lineWidth=(3.5+intensity*3)*pulse;cx.globalAlpha=.85;cx.strokeStyle='#fff';
  cx.beginPath();pts.forEach((p,i)=>i===0?cx.moveTo(p.x,p.y):cx.lineTo(p.x,p.y));cx.stroke();
  // Energy ball (5+)
  if(chain.length>=5&&pts.length>=2){const t=(now*.003)%1;
    let totalLen=0;for(let i=1;i<pts.length;i++)totalLen+=Math.hypot(pts[i].x-pts[i-1].x,pts[i].y-pts[i-1].y);
    let trav=t*totalLen,bx=pts[0].x,by=pts[0].y;
    for(let i=1;i<pts.length;i++){const seg=Math.hypot(pts[i].x-pts[i-1].x,pts[i].y-pts[i-1].y);
      if(trav<=seg){const st=trav/seg;bx=pts[i-1].x+(pts[i].x-pts[i-1].x)*st;by=pts[i-1].y+(pts[i].y-pts[i-1].y)*st;break}trav-=seg}
    cx.globalAlpha=.8;cx.fillStyle='#fff';cx.shadowBlur=20;cx.shadowColor=tp.color;
    cx.beginPath();cx.arc(bx,by,4+intensity*6,0,Math.PI*2);cx.fill();cx.shadowBlur=0}
  cx.restore();
  // Sparkle
  if(pts.length>=2&&Math.random()<.4+intensity*.4){const si=~~(Math.random()*(pts.length-1));
    const a=pts[si],b=pts[si+1];const t=Math.random();
    emit(a.x+(b.x-a.x)*t,a.y+(b.y-a.y)*t,1+~~(intensity*3),
      {speed:1+intensity*2,size:2.5+intensity*2,colors:[tp.color,tp.light,'#fff'],gravity:-.02,decay:.04})}
  // Chain count
  if(chain.length>=2){const last=chain[chain.length-1],lx=last.x,ly=last.y-ballR*1.5;
    const cs=1+Math.sin(now*.01)*.05+intensity*.3;
    const col=chain.length>=10?'#ffd93d':chain.length>=7?'#ff6b6b':chain.length>=5?'#7dd889':'#fff';
    cx.save();cx.translate(lx,ly);cx.scale(cs,cs);
    cx.font='bold '+Math.min(16+chain.length*2,32)+'px sans-serif';cx.textAlign='center';cx.textBaseline='middle';
    cx.fillStyle='rgba(0,0,0,.5)';cx.fillText('x'+chain.length,1,1);
    cx.fillStyle=col;cx.fillText('x'+chain.length,0,0);cx.restore();
    if(chain.length<3){cx.font='bold 13px sans-serif';cx.fillStyle='rgba(255,255,255,.5)';cx.textAlign='center';
      cx.fillText('あと'+(3-chain.length),lx,ly+16)}}}

function toast(t){const el=document.createElement('div');el.className='toast';el.textContent=t;
  el.style.top=(14+toasts.length*5)+'%';document.body.appendChild(el);toasts.push(el);
  setTimeout(()=>{el.remove();toasts=toasts.filter(x=>x!==el)},1800)}
function scorePop(x,y,t,col,sz=22){const s=toScr(x,y);const el=document.createElement('div');el.className='sp';el.textContent=t;
  el.style.cssText='left:'+s.x+'px;top:'+s.y+'px;color:'+col+';font-size:'+(sz*gScale)+'px';
  document.body.appendChild(el);scorePops.push(el);setTimeout(()=>{el.remove();scorePops=scorePops.filter(p=>p!==el)},900)}

// ======== TOUCH INPUT ========
let lastVirt=null;
cv.addEventListener('pointerdown',e=>{e.preventDefault();
  if(!gm.running||gm.paused)return;
  const v=toVirt(e.clientX,e.clientY);
  touchPos={x:v.x,y:v.y};lastVirt={x:v.x,y:v.y};
  // Find nearest ball
  let best=null,bd=Infinity;
  for(const b of balls){if(b.popping)continue;
    const d=Math.hypot(v.x-b.x,v.y-b.y);
    if(d<ballR*TOUCH_F&&d<bd){best=b;bd=d}}
  if(best&&best.type>=0)startChain(best)},{passive:false});
cv.addEventListener('pointermove',e=>{e.preventDefault();
  if(gm.paused)return;
  // Use coalesced events for smoother input when available
  const evts=(e.getCoalescedEvents&&e.getCoalescedEvents().length>0)?e.getCoalescedEvents():[e];
  for(const ev of evts){const v=toVirt(ev.clientX,ev.clientY);
    touchPos={x:v.x,y:v.y};
    if(dragging){
      if(lastVirt){const dx=v.x-lastVirt.x,dy=v.y-lastVirt.y,dist=Math.hypot(dx,dy);
        const step=ballR*.35;
        if(dist>step){const n=Math.min(Math.ceil(dist/step),40);
          for(let i=1;i<=n;i++){const t=i/n;tryConnect(lastVirt.x+dx*t,lastVirt.y+dy*t)}}
        else tryConnect(v.x,v.y)}
      else tryConnect(v.x,v.y)}
    lastVirt={x:v.x,y:v.y}}
  const vf=toVirt(e.clientX,e.clientY);
  if(gm.running&&trails.length<80)trails.push({x:vf.x+(Math.random()-.5)*6,
    y:vf.y+(Math.random()-.5)*6,sz:2+Math.random()*3,c:'hsl('+~~(Math.random()*360)+',75%,65%)',life:1})},{passive:false});
cv.addEventListener('pointerup',e=>{e.preventDefault();endChain();lastVirt=null},{passive:false});
cv.addEventListener('pointercancel',()=>{endChain();lastVirt=null});
cv.addEventListener('pointerleave',()=>{endChain();lastVirt=null});
document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
document.getElementById('bbSkill').addEventListener('click',e=>{e.stopPropagation();if(!gm.paused)activateSkill()});

// ======== PAUSE SYSTEM ========
function pauseGame(){
  if(!gm.running||gm.paused||gm._starting)return;
  gm.paused=true;gm._pauseT=performance.now();
  clearInterval(gm._ti);gm._ti=null;stopBGM();
  if(gm.fever&&gm._feverTO){const fd=CFG.feverDur;gm._feverRemaining=Math.max(0,fd-(performance.now()-gm._feverStartT));
    clearTimeout(gm._feverTO);gm._feverTO=null}
  clearTimeout(gm._feverLabelTO);
  if(dragging)endChain();
  document.getElementById('ps').classList.remove('hide');document.getElementById('bbPause').textContent='▶'}
function resumeGame(){
  if(!gm.paused)return;gm.paused=false;
  const dur=performance.now()-gm._pauseT;
  if(gm.lastClear>0)gm.lastClear+=dur;
  gm._ti=setInterval(timerTick,1000);startBGM();
  if(gm.fever&&gm._feverRemaining>0){gm._feverStartT=performance.now();
    gm._feverTO=setTimeout(()=>{if(gm.running)endFever()},gm._feverRemaining)}
  document.getElementById('ps').classList.add('hide');document.getElementById('bbPause').textContent='⏸'}
function quitGame(){
  gm.paused=false;gm.running=false;clearInterval(gm._ti);clearTimeout(gm._feverTO);clearTimeout(gm._feverLabelTO);stopBGM();
  gm.fever=false;gm._rainbowTime=false;gm._slowMo=1;gm._reachMul=1;
  gm._rainbowRemain=0;gm._slowRemain=0;gm._skillActive=false;
  popAnim=null;chain=[];dragging=false;
  document.getElementById('ff').classList.remove('on');document.getElementById('cb').style.width='0%';
  document.getElementById('bbCombo').style.opacity='0';document.getElementById('ps').classList.add('hide');
    document.getElementById('bottomBar').style.display='none';
  document.getElementById('tl').textContent='TIME';document.getElementById('tv').style.color='';
  document.getElementById('urgency').style.opacity='0';document.getElementById('urgency').style.animation='none';
  document.getElementById('ss').classList.remove('hide');refreshStartHS()}
function timerTick(){
  if(!gm.running)return;
  if(gm._slowMo<1){gm._slowAccum+=gm._slowMo;if(gm._slowAccum<1)return;gm._slowAccum-=1}
  gm.timeLeft--;
  const tv=document.getElementById('tv');tv.textContent=Math.max(0,gm.timeLeft);
  const urg=document.getElementById('urgency');
  if(gm.timeLeft<=10&&gm.timeLeft>5){tv.style.color='#ffb756';urg.style.opacity='0'}
  if(gm.timeLeft<=5&&gm.timeLeft>0){tv.style.color='#ff6b6b';tv.style.animation='pulse .5s infinite';sfxCD(1);triggerFlash(.08);
    urg.style.opacity='1';urg.style.animation='urgPulse .8s ease-in-out infinite'}
  if(gm.timeLeft>5){urg.style.opacity='0';urg.style.animation='none'}
  if(gm.timeLeft===1){triggerFlash(.15)}
  if(gm.timeLeft<=3&&gm.timeLeft>0){const cd=document.getElementById('cd');cd.textContent=gm.timeLeft;
    cd.style.color='#ff6b6b';cd.style.animation='none';void cd.offsetHeight;cd.style.animation='cdp .7s ease forwards'}
  if(gm.timeLeft===10){stopBGM();startBGM(170);toast('⏰ のこり10びょう!')}
  if(gm.timeLeft<=0){urg.style.opacity='0';urg.style.animation='none';endGame()}}

// ======== ACHIEVEMENTS ========
function checkAchievements(){
  const checks=[
    ['firstPop',()=>stats.totalPops>0],
    ['chain8',()=>stats.bestChain>=8],
    ['score1k',()=>stats.bestScore>=1000],
    ['firstFever',()=>stats.feverCount>0],
    ['play10',()=>stats.totalPlays>=10],
    ['score3k',()=>stats.bestScore>=3000]];
  for(const[id,fn]of checks){
    if(!unlockedAch.includes(id)&&fn()){unlockedAch.push(id);saveAch();
      const a=ACHIEVEMENTS.find(x=>x.id===id);if(a)achToast(a)}}}
function achToast(a){
  sfxAch();haptic(30);
  const el=document.createElement('div');el.className='ach-toast';
  el.textContent=a.emoji+' '+a.name+' かいほう!';document.body.appendChild(el);
  setTimeout(()=>el.remove(),2600)}
function showAchScreen(){
  const grid=document.getElementById('achGrid');grid.innerHTML='';
  const cnt=unlockedAch.length;
  document.getElementById('achCount').textContent=cnt+'/'+ACHIEVEMENTS.length;
  ACHIEVEMENTS.forEach(a=>{const d=document.createElement('div');
    d.className='ach-item'+(unlockedAch.includes(a.id)?'':' locked');
    d.innerHTML='<div class="ach-emoji">'+a.emoji+'</div><div class="ach-name">'+a.name+'</div><div class="ach-desc">'+a.desc+'</div>';
    grid.appendChild(d)});
  document.getElementById('achScr').classList.remove('hide')}

// ======== DAILY CHALLENGE ========
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;
  var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;
  return((t^t>>>14)>>>0)/4294967296}}
function getDailySeed(){const d=new Date();return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate()}
function getTodayKey(){const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function updateDailyInfo(){
  const el=document.getElementById('dailyInfo');
  const best=dailyBest[getTodayKey()];
  el.textContent=best?'きょうのベスト: '+best+' てん':'きょうはまだプレイしていません';
  el.style.display=gm.mode==='daily'?'':'none'}

// ======== COUNTDOWN ========
function countdown(){return new Promise(res=>{let n=3;const el=document.getElementById('cd');
  (function go(){el.textContent=n===0?'GO!':n;
    el.style.color=n===0?'#7dd889':n===1?'#ff6b6b':n===2?'#ffd93d':'#fff';
    el.style.animation='none';void el.offsetHeight;el.style.animation='cdp .7s ease forwards';
    sfxCD(n);
    // Enhanced particles
    const cx2=W/2,cy2=H/2;
    emit(cx2,cy2,15+n*5,{speed:8,size:5,colors:['#ffd93d','#ff7eb3','#7dd889','#5dd8cf','#fff'],
      gravity:.05,shapes:['star','circle','diamond']});
    if(n===0){triggerFlash(.2);triggerShake(8);setTimeout(res,500);return}n--;setTimeout(go,800)})()})}

// ======== GAME FLOW ========
async function startGame(){
  if(gm._starting)return;gm._starting=true;initA();
  if(gm.mode==='daily')dailyRng=mulberry32(getDailySeed());
  clearTimeout(gm._feverTO);clearTimeout(gm._feverLabelTO);clearInterval(gm._ti);clearInterval(gm._fireworkIV);stopBGM();
  Object.assign(gm,{score:0,combo:0,maxCombo:0,popped:0,maxChain:0,
    timeLeft:CFG.time,totalTime:CFG.time,running:false,paused:false,fever:false,
    feverCount:0,lastClear:0,skillCharge:0,_feverRemaining:0,
    _rainbowTime:false,_rainbowRemain:0,_slowMo:1,_slowRemain:0,_slowAccum:0,_reachMul:1,_skillActive:false,
    _gameStartT:performance.now()});
  displayScore=0;missionIdx=0;popAnim=null;chain=[];dragging=false;touchPos=null;
  spawnQueue=0;spawnT=0;hintGroup=null;hintT=0;settled=false;
  rings=[];speedLines=[];shakeX=shakeY=shakeMag=0;flashAlpha=0;
  toasts.forEach(t=>t.remove());toasts=[];scorePops.forEach(p=>p.remove());scorePops=[];
  document.getElementById('sv').textContent='0';
  document.getElementById('tv').textContent=CFG.time;document.getElementById('tl').textContent='TIME';
  document.getElementById('tv').style.color='';document.getElementById('tv').style.animation='none';
  document.getElementById('cb').style.width='0%';document.getElementById('bbCombo').style.opacity='0';
  document.getElementById('ff').classList.remove('on');
  document.getElementById('urgency').style.opacity='0';document.getElementById('urgency').style.animation='none';
  const fl=document.getElementById('fl');fl.style.opacity='0';fl.style.transform='translate(-50%,-50%) scale(0)';
  document.getElementById('ss').classList.add('hide');document.getElementById('es').classList.add('hide');
    document.getElementById('bbPause').textContent='⏸';
  document.getElementById('bottomBar').style.display='flex';
  const bbIcon=document.getElementById('bbSkillIcon');bbIcon.classList.remove('ready');
  bbIcon.childNodes[bbIcon.childNodes.length-1].textContent=TYPES[gm.myAnimal].emoji;
  document.getElementById('bbSkillLabel').textContent='0%';
  document.getElementById('bbSkillLabel').classList.remove('ready');
  updateSkillUI();
  initBalls();await countdown();
  gm.running=true;gm._starting=false;gm._gameStartT=performance.now();startBGM();
  // Stats
  stats.totalPlays++;
  if(!stats.usedAnimals.includes(gm.myAnimal))stats.usedAnimals.push(gm.myAnimal);
  saveStats();
  gm._ti=setInterval(timerTick,1000);
  if(!localStorage.getItem('atTutDone')){
    setTimeout(()=>{if(gm.running&&gm.popped===0)toast('👆 おなじどうぶつをなぞってね!');
      setTimeout(()=>{if(gm.running&&gm.popped===0)toast('👆 3びきいじょう つなげてね!');
        else try{localStorage.setItem('atTutDone','1')}catch(e){}},5000)},2000)}}
function endGame(){
  gm.running=false;clearInterval(gm._ti);clearTimeout(gm._feverTO);clearTimeout(gm._feverLabelTO);stopBGM();
  gm.fever=false;popAnim=null;chain=[];dragging=false;
  document.getElementById('urgency').style.opacity='0';document.getElementById('urgency').style.animation='none';
  document.getElementById('ff').classList.remove('on');document.getElementById('cb').style.width='0%';
  document.getElementById('bbCombo').style.opacity='0';sfxEnd();
  // Stats
  if(gm._gameStartT)stats.totalPlayTime+=(performance.now()-gm._gameStartT);
  if(gm.score>stats.bestScore)stats.bestScore=gm.score;
  saveStats();checkAchievements();
  const s=gm.score;
  if(s>=300){let n=0;const fwSize=s>=1000?35:20;
    gm._fireworkIV=setInterval(()=>{
      const cnt=s>=1000?3:1;
      for(let j=0;j<cnt;j++)emit(Math.random()*W,Math.random()*H*.6,fwSize,{speed:s>=1000?12:9,size:s>=1000?8:5,
        colors:['#ff7eb3','#ffe066','#7dd889','#5dd8cf','#b49cfc','#fff','#ff6b6b'],gravity:s>=1000?.04:.07,
        shapes:['circle','star','heart','diamond']});if(++n>(s>=1000?20:10))clearInterval(gm._fireworkIV)},s>=1000?180:250)}
  // Determine best key and thresholds
  let bestKey,th2;
  if(gm.mode==='daily'){bestKey='daily_'+getTodayKey();th2={s1:280,s2:900,s3:2400};
    const tk=getTodayKey();if(!dailyBest[tk]||s>dailyBest[tk]){dailyBest[tk]=s;
      try{localStorage.setItem('atDaily',JSON.stringify(dailyBest))}catch(e){}}}
  else{bestKey='main';th2={s1:250,s2:800,s3:2200}}
  const prev=gm.best[bestKey]||0,isNew=s>prev;
  if(isNew){gm.best[bestKey]=s;try{localStorage.setItem('atB3',JSON.stringify(gm.best))}catch(e){}}
  const starCount=s>=th2.s3?3:s>=th2.s2?2:s>=th2.s1?1:0;
  const rk=starCount===3?'すごすぎ!':starCount===2?'すばらしい!':starCount===1?'がんばった!':'つぎはがんばろう!';
  const emj=starCount===3?'🏆':starCount===2?'🌟':starCount===1?'😊':'💪';
  setTimeout(()=>{
        document.getElementById('bottomBar').style.display='none';
    document.getElementById('eE').textContent=emj;
    const stEl=document.getElementById('eSt');stEl.innerHTML='';
    for(let i=0;i<3;i++){const sp=document.createElement('span');sp.textContent=i<starCount?'⭐':'☆';
      stEl.appendChild(sp);setTimeout(()=>sp.classList.add(i<starCount?'on':'off'),400+i*350)}
    const scoreEl=document.getElementById('eS');scoreEl.textContent='0';
    const countDur=Math.min(2000,s*2);const startT2=performance.now();let prevPct=-1;
    (function animC(){const elapsed=performance.now()-startT2;const prog=Math.min(elapsed/countDur,1);
      const eased=1-Math.pow(1-prog,3);const curr=Math.round(s*eased);scoreEl.textContent=curr;
      const pctNow=Math.floor(prog*10);if(pctNow>prevPct){prevPct=pctNow;nt(300+pctNow*60,'sine',.06,.08)}
      if(prog<1)requestAnimationFrame(animC);
      else [523,659,784].forEach((f,i)=>nt(f,'triangle',.2,.12,i*.08))})();
    document.getElementById('eR').textContent=rk;
    document.getElementById('eP').textContent=gm.popped;
    document.getElementById('eC').textContent=gm.maxCombo;
    document.getElementById('ePL').textContent='ポップ';
    document.getElementById('eCL').textContent='さいこうコンボ';
    document.getElementById('eL').textContent=gm.maxChain;document.getElementById('eLL').textContent='ながさMAX';
    document.getElementById('eB').textContent=gm.best[bestKey]||s;
    document.getElementById('eBL').textContent='ベスト';
    const nextStar=starCount<3?(starCount===0?th2.s1:starCount===1?th2.s2:th2.s3):null;
    const nextEl=document.getElementById('eNext');
    if(nextStar&&s>0){nextEl.textContent='あと '+(nextStar-s)+' てんで ⭐'+'⭐'.repeat(starCount+1)+'!';nextEl.style.display=''}
    else if(starCount===3){nextEl.textContent='かんぺき! すべての ⭐ をゲット!';nextEl.style.display=''}
    else nextEl.style.display='none';
    document.getElementById('eN').style.display=isNew&&s>0?'':'none';
    // High score
    const hsRankEl=document.getElementById('eHsRank');
    const hsIdx=s>0?addHS(s,gm.myAnimal,gm.mode):-1;
    if(hsIdx>=0&&hsIdx<HS_MAX){const medals=['👑 1い!','🥈 2い!','🥉 3い!','4い!','5い!'];
      hsRankEl.textContent='🏆 ランキング '+medals[hsIdx];hsRankEl.style.display=''}
    else hsRankEl.style.display='none';
    document.getElementById('ePC').textContent=stats.totalPlays+'かいめのプレイ';
    if((isNew&&s>0)||(hsIdx>=0&&hsIdx<3)){let fw=0;const fwI=setInterval(()=>{
      for(let j=0;j<3;j++)emit(Math.random()*W,Math.random()*H*.5,30,{speed:12,size:8,
        colors:['#ffd93d','#ff7eb3','#7dd889','#5dd8cf','#b49cfc','#fff'],
        gravity:.04,shapes:['star','heart','diamond']});
      nt(PENTA[fw%PENTA.length],'triangle',.25,.15);if(++fw>20)clearInterval(fwI)},180)}
    document.getElementById('es').classList.remove('hide')},800)}

// ======== MAIN LOOP ========
function loop(now){
  if(!lastT){lastT=now;requestAnimationFrame(loop);return}
  const dt=Math.min(now-lastT,50);lastT=now;
  tickShake();tickRipples();tickSpeedLines();
  cx.setTransform(dpr,0,0,dpr,0,0);
  cx.fillStyle='#0a0020';cx.fillRect(0,0,screenW,screenH);
  cx.setTransform(dpr*gScale,0,0,dpr*gScale,gOffX*dpr,gOffY*dpr);
  cx.save();cx.translate(shakeX,shakeY);
  drawBG(now);
  if(!gm.paused){
    physicsTick();
    if(popAnim)tickPop(dt);
    tickSpawn();
    balls.forEach(b=>{if(!b.popping&&b.scale>1.01)b.scale+=(1-b.scale)*.15})}
  if(gm._slowMo<1){cx.fillStyle='rgba(80,140,255,.07)';cx.fillRect(0,0,W,H)}
  drawBalls(now);drawChainLine(now);
  drawRipples();tickP();drawP();drawSpeedLines();
  cx.restore();
  drawFlash();
  if(gm.running&&!gm.paused){
    tickComboBar();tickDisplayScore();
    if(!dragging&&!popAnim&&settled){hintT+=dt;
      const hintDelay=CFG.hint;
      if(hintT>hintDelay&&!hintGroup){hintGroup=findHint()}}
    if(gm.combo>0){const comboWin=CFG.comboWin;
      if(performance.now()-gm.lastClear>comboWin){gm.combo=0;updateComboUI()}}
    if(gm.fever&&Math.random()<.3)emitSpeedLines(2,1);
    else if(gm.combo>=3&&Math.random()<.15)emitSpeedLines(1,gm.combo*.15);
    // Skill timers
    if(gm._rainbowRemain>0){gm._rainbowRemain-=dt;
      if(gm._rainbowRemain<=0){gm._rainbowTime=false;gm._reachMul=1;toast('🌈 レインボータイムおわり!')}}
    if(gm._slowRemain>0){gm._slowRemain-=dt;
      if(gm._slowRemain<=0){gm._slowMo=1;gm._reachMul=1;document.getElementById('tv').style.color='';
        toast('⏩ スピードもどった!')}}}
  requestAnimationFrame(loop)}
requestAnimationFrame(loop);
